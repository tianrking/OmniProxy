name: ci

on:
  push:
    branches: ["**"]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    name: verify (ubuntu-amd64)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cargo fmt
        run: cargo fmt --all --check

      - name: Cargo check
        run: cargo check --all-targets

      - name: Cargo test
        run: cargo test --all-targets --all-features

      - name: Rule preflight check
        run: cargo run --bin omni_proxy -- --check-rules --rule-file ./examples/rules-ci.txt

  build-linux:
    name: build (${{ matrix.target }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            use_cross: false
          - target: aarch64-unknown-linux-gnu
            use_cross: true
          - target: armv7-unknown-linux-gnueabihf
            use_cross: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross
        if: matrix.use_cross
        uses: taiki-e/install-action@cross

      - name: Build release with cargo
        if: ${{ !matrix.use_cross }}
        run: cargo build --release --target ${{ matrix.target }}

      - name: Build release with cross
        if: matrix.use_cross
        run: cross build --release --target ${{ matrix.target }}

      - name: Upload linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: omni-linux-${{ matrix.target }}
          path: |
            target/${{ matrix.target }}/release/omni_proxy
            target/${{ matrix.target }}/release/omni-tui
            target/${{ matrix.target }}/release/omni-replay
          if-no-files-found: error

  build-windows:
    name: build (windows-x64)
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Build release
        run: cargo build --release --target x86_64-pc-windows-msvc

      - name: Upload windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: omni-windows-x86_64-pc-windows-msvc
          path: |
            target/x86_64-pc-windows-msvc/release/omni_proxy.exe
            target/x86_64-pc-windows-msvc/release/omni-tui.exe
            target/x86_64-pc-windows-msvc/release/omni-replay.exe
          if-no-files-found: error

  build-macos:
    name: build (${{ matrix.target }})
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        target:
          - x86_64-apple-darwin
          - aarch64-apple-darwin
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build release
        run: cargo build --release --target ${{ matrix.target }}

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: omni-macos-${{ matrix.target }}
          path: |
            target/${{ matrix.target }}/release/omni_proxy
            target/${{ matrix.target }}/release/omni-tui
            target/${{ matrix.target }}/release/omni-replay
          if-no-files-found: error

  package-deb:
    name: package (.deb)
    runs-on: ubuntu-latest
    needs: [verify]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install packaging dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y dpkg-dev fakeroot

      - name: Install cargo-deb
        run: cargo install cargo-deb --locked

      - name: Build release binaries
        run: cargo build --release

      - name: Build deb package
        run: cargo deb --no-build

      - name: Upload deb artifact
        uses: actions/upload-artifact@v4
        with:
          name: omni-deb
          path: target/debian/*.deb
          if-no-files-found: error
